name: Terraform Validate

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform-validate.yaml"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform-validate.yaml"

permissions:
  contents: read

# testing

jobs:
  validate:
    name: Validate Terraform Configuration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: infra/.terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('infra/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - name: Check formatting
        id: fmt
        run: terraform fmt -check -recursive -diff
        continue-on-error: true

      - name: Initialise (no backend)
        id: init
        run: terraform init -backend=false

      - name: Validate configuration
        id: validate
        run: terraform validate

      - name: Post validation summary
        if: always()
        run: |
          echo "## Terraform Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Format | ${{ steps.fmt.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Init | ${{ steps.init.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ steps.validate.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if formatting check failed
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "::error::Terraform formatting check failed. Run 'terraform fmt -recursive' locally."
          exit 1