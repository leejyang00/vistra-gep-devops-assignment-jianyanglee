name: Documentation Lint

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - ".github/workflows/docs-lint.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.md"
      - ".github/workflows/docs-lint.yaml"

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Lint Markdown Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint markdown files
        run: markdownlint '**/*.md' --ignore node_modules --ignore .terraform
        continue-on-error: false

      - name: Check for broken internal links
        run: |
          echo "Checking for broken internal links..."
          errors=0
          for file in $(find . -name "*.md" -not -path "./node_modules/*"); do
            # Extract markdown links to local files
            links=$(grep -oP '\[.*?\]\((?!http)(.*?)\)' "$file" | grep -oP '\(.*?\)' | tr -d '()' | cut -d'#' -f1)
            for link in $links; do
              if [ -n "$link" ] && [ ! -f "$(dirname "$file")/$link" ] && [ ! -f "$link" ]; then
                echo "::warning file=$file::Broken link: $link"
                errors=$((errors + 1))
              fi
            done
          done
          echo "Found $errors potential broken link(s)"
